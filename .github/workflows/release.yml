name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    # Skip if the triggering push was authored by the bot (avoids infinite release loop).
    # 'github-actions[bot]' is the canonical identity set by this workflow in the "Configure git" step.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_commit.author.name != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cocogitto
        uses: cocogitto/cocogitto-action@v3

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump and generate changelog
        run: |
          cog bump --auto
          cog changelog --at "$(git describe --tags --abbrev=0)" > RELEASE_NOTES.md
          git push --follow-tags

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(git describe --tags --abbrev=0)"
          gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
