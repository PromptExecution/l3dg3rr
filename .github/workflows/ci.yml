name: CI with MCP Registry Publish

on:
  push:
    branches: [main, milestone/**, feature/**]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Clippy SARIF converter
        run: cargo install clippy-sarif --locked

      - name: Generate Clippy SARIF
        run: |
          cargo clippy --workspace --all-targets --all-features --message-format=json > clippy.json
          clippy-sarif < clippy.json > clippy.sarif

      - name: Upload Clippy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy.sarif

      - name: Cargo test
        run: cargo test --workspace --all-targets --all-features

      - name: Run MVP E2E flow
        run: ./scripts/e2e_mvp.sh

      - name: Build container
        run: docker build -t tax-ledger:ci .

      - name: Build ledgerr-mcp binary
        run: cargo build -p ledgerr-mcp --release --bin ledgerr-mcp-server

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledgerr-mcp
          path: target/release/ledgerr-mcp-server

  publish-mcp-registry:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ledgerr-mcp
          path: .

      - name: Make binary executable
        run: chmod +x ledgerr-mcp-server

      - name: Get version
        run: |
          echo "VERSION=v$(cargo pkgid -p ledgerr-mcp | cut -d'#' -f2)" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Create MCPB bundle
        run: |
          mkdir -p bundle
          cp ledgerr-mcp-server bundle/
          cat > bundle/manifest.json << EOF
          {
            "name": "ledgerr-mcp",
            "description": "Tax ledger MCP server for document intelligence and U.S. expat tax preparation",
            "version": "${{ env.VERSION }}",
            "entry_point": "ledgerr-mcp-server"
          }
          EOF
          cd bundle && mcpb pack ../ledgerr-mcp.mcpb

      - name: Upload MCPB as release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          files: ./ledgerr-mcp.mcpb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

