name: CI with MCP Registry Publish

on:
  push:
    branches: [main, milestone/**, feature/**]
  pull_request:

permissions:
  contents: write
  security-events: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Clippy SARIF converter
        run: cargo install clippy-sarif --locked

      - name: Generate Clippy SARIF
        run: |
          cargo clippy --workspace --all-targets --all-features --message-format=json > clippy.json
          clippy-sarif < clippy.json > clippy.sarif

      - name: Upload Clippy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: clippy.sarif

      - name: Cargo test
        run: cargo test --workspace --all-targets --all-features

      - name: Run MVP E2E flow
        run: ./scripts/e2e_mvp.sh

      - name: Build container
        run: docker build -t tax-ledger:ci .

      - name: Build ledgerr-mcp binary
        run: cargo build -p ledgerr-mcp --release --bin ledgerr-mcp-server

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledgerr-mcp
          path: target/release/ledgerr-mcp-server

  publish-mcp-registry:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ledgerr-mcp
          path: .

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get version
        run: echo "VERSION=v$(cargo pkgid -p ledgerr-mcp | cut -d'#' -f2)" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle .mcpb via xtask
        run: |
          mkdir -p dist
          cp ledgerr-mcp-server dist/
          cargo xtask-mcpb bundle \
            --binary dist/ledgerr-mcp-server \
            --output dist/ledgerr-mcp-x86_64-unknown-linux-gnu.mcpb \
            --version ${{ env.VERSION }}

      - name: Verify bundle
        run: cargo xtask-mcpb verify dist/ledgerr-mcp-x86_64-unknown-linux-gnu.mcpb

      - name: Upload MCPB as release asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          files: dist/ledgerr-mcp-x86_64-unknown-linux-gnu.mcpb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}